name: Inject Navigation Menu

on:
  push:
    branches:
      - main
  workflow_dispatch:

# allow the job to push back to the repo
permissions:
  contents: write

jobs:
  inject:
    # do not run this job when the actor is the actions bot (prevents infinite loop)
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make injector executable
        run: chmod +x scripts/inject-nav.sh

      - name: Run injector script
        run: bash scripts/inject-nav.sh

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-updated navigation menu"
