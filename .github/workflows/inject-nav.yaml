name: Inject Navigation Menu

# Run on pushes to main and via manual dispatch
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Allow workflow to write back to repo (required for commit)
permissions:
  contents: write

# Avoid concurrent runs colliding
concurrency:
  group: inject-nav-${{ github.repository }}
  cancel-in-progress: false

jobs:
  inject:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with push credentials)
        uses: actions/checkout@v4
        with:
          # keep the GITHUB_TOKEN credentials so commit/push works
          persist-credentials: true
          fetch-depth: 0

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/inject-nav.sh || true

      - name: Install dependencies (jq)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Run injector script
        # keep shell/bash to preserve behaviour
        run: |
          bash scripts/inject-nav.sh

      - name: Commit & push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-updated navigation menu"
          # leave default token; will use GITHUB_TOKEN with repo write perms
